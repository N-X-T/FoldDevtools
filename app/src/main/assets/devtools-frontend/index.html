<!doctypehtml><html lang=vi><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>DevTools Targets</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"rel=stylesheet><style>:root{--bg-color:#f8fafc;--text-main:#0f172a;--text-muted:#64748b;--card-bg:#ffffff;--border-color:#e2e8f0;--primary:#3b82f6;--primary-hover:#2563eb;--success:#10b981;--danger:#ef4444}body{font-family:Inter,sans-serif;background-color:var(--bg-color);color:var(--text-main);margin:0;padding:2rem 1rem;line-height:1.5}.container{max-width:800px;margin:0 auto}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}h1{font-size:1.75rem;font-weight:600;margin:0}.btn-refresh{background-color:var(--primary);color:#fff;border:none;padding:.5rem 1rem;border-radius:6px;font-size:.875rem;font-weight:500;cursor:pointer;transition:background-color .2s;display:flex;align-items:center;gap:.5rem}.btn-refresh:hover{background-color:var(--primary-hover)}.target-list{display:flex;flex-direction:column;gap:1rem}.card{background-color:var(--card-bg);border:1px solid var(--border-color);border-radius:10px;padding:1.25rem;cursor:pointer;transition:all .2s ease-in-out;position:relative;overflow:hidden;user-select:none}.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background-color:var(--primary);opacity:0;transition:opacity .2s}.card:hover{transform:translateY(-2px);box-shadow:0 10px 15px -3px rgba(0,0,0,.05),0 4px 6px -2px rgba(0,0,0,.025);border-color:transparent}.card:hover::before{opacity:1}.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem}.card-title{font-size:1.125rem;font-weight:600;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:1rem}.badge{background-color:#e0e7ff;color:#3730a3;padding:.25rem .5rem;border-radius:9999px;font-size:.75rem;font-weight:600;text-transform:uppercase}.card-url{color:var(--text-muted);font-size:.875rem;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card-footer{margin-top:1rem;padding-top:.75rem;border-top:1px dashed var(--border-color);font-size:.85rem;color:var(--text-muted);display:flex;justify-content:space-between;align-items:center}.copy-status{color:var(--success);font-weight:500;opacity:0;transition:opacity .3s}.state-message{text-align:center;padding:3rem;color:var(--text-muted);background:var(--card-bg);border-radius:10px;border:1px dashed var(--border-color)}.state-message.error{color:var(--danger);border-color:var(--danger);background-color:#fef2f2}</style><div class=container><div class=header><h1>Inspect Targets</h1><button class=btn-refresh onclick=fetchTargets()><svg width=16 height=16 fill=none stroke=currentColor viewBox="0 0 24 24"xmlns=http://www.w3.org/2000/svg><path stroke-linecap=round stroke-linejoin=round stroke-width=2 d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>Làm mới</button></div><div id=target-list class=target-list><div class=state-message>Đang tải dữ liệu...</div></div></div><script>const targetListContainer=document.getElementById("target-list");async function fetchTargets(){targetListContainer.innerHTML='<div class="state-message">Đang tải dữ liệu...</div>';try{const t=await fetch("/json");if(!t.ok)throw new Error(`HTTP error! status: ${t.status}`);renderTargets(await t.json())}catch(t){console.error("Lỗi khi fetch data:",t),targetListContainer.innerHTML='\n                <div class="state-message error">\n                    <strong>Lỗi tải dữ liệu:</strong> Không thể kết nối tới /json.<br>\n                    Hãy đảm bảo máy chủ đang chạy và bạn có quyền truy cập endpoint này.\n                </div>'}}function renderTargets(t){targetListContainer.innerHTML="";const e=t.filter((t=>t.webSocketDebuggerUrl));0!==e.length?e.forEach((t=>{const e=`devtools://devtools/bundled/inspector.html?ws=${t.webSocketDebuggerUrl.replace("ws://","")}`,n=document.createElement("div");n.className="card",n.title="Click để copy URL và mở tab mới",n.innerHTML=`\n                <div class="card-header">\n                    <h2 class="card-title">${t.title||"Untitled"}</h2>\n                    <span class="badge">${t.type||"page"}</span>\n                </div>\n                <p class="card-url">${t.url}</p>\n                <div class="card-footer">\n                    <span>👆 Click để copy link & mở tab mới</span>\n                    <span class="copy-status">✓ Đã copy!</span>\n                </div>\n            `,n.addEventListener("click",(async()=>{try{if(navigator.clipboard)await navigator.clipboard.writeText(text);else{const t=document.createElement("textarea");t.value=e,document.body.appendChild(t),t.select(),document.execCommand("copy"),t.remove()}const t=n.querySelector(".copy-status");t.style.opacity="1",setTimeout((()=>{t.style.opacity="0"}),2e3),window.open("about:blank","_blank")}catch(t){console.error("Không thể copy text: ",t),alert("Trình duyệt của bạn chặn việc copy tự động. URL là:\n\n"+e)}})),targetListContainer.appendChild(n)})):targetListContainer.innerHTML='<div class="state-message">Không tìm thấy Inspect Target nào khả dụng lúc này.</div>'}document.addEventListener("DOMContentLoaded",fetchTargets)</script>
